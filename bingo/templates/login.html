
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Entrar - Bingo Solidario</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f4f9; text-align: center; padding-top: 50px;">



    <div style="background-color: white; width: 350px; margin: auto; padding: 30px; border-radius: 10px; box-shadow: 0px 4px 8px rgba(0,0,0,0.1);">
        <h2 style="color: #007bff;">Iniciar Sesión</h2>
        
        <form method="POST" style="text-align: left;">
            
            {% csrf_token %} 
            
            {{ formulario.as_p }} 
            
            <button type="submit" style="background-color: #007bff; color: white; padding: 10px; border: none; border-radius: 5px; width: 100%; font-size: 16px; cursor: pointer; margin-top: 10px;">
                Entrar a la Sala
            </button>
        </form>
    </div>



</body>
</html>
